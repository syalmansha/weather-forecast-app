<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="main">

        <!-- UPPER SECTION -->

        <div class="upper">

            <h1>Weather</h1>

            <div class="search">

                <input
                class="search-input"
                type="text"
                placeholder="Enter the city">

                <button class="search-btn">
                    Search
                </button>

                <button class="location-btn">
                    Current Location
                </button>

            </div>

        </div>


        <!-- LOWER SECTION -->

        <div class="lower">


            <!-- RIGHT CONTAINER -->
             

            <div class="right-container">

                <!-- CURRENT WEATHER -->

                <div class="now">

                    <div class="temp">
                        31°C
                    </div>

                    <div class="city">
                        Delhi
                    </div>

                    <div class="condition">
                        Cloudy
                    </div>

                    <div class="icon">
                        ☀️
                    </div>

                </div>


                <!-- FORECAST -->

                <div class="days-forecast">

                    <h2 class="section-title">
                        5 Day Forecast
                    </h2>

                    <div class="forecast-card">

                        <p>Monday</p>

                        <p>30°C</p>

                        <p>☀️</p>

                    </div>

                    <div class="forecast-card">

                        <p>Tuesday</p>

                        <p>28°C</p>

                        <p>☁️</p>

                    </div>

                    <div class="forecast-card">

                        <p>Wednesday</p>

                        <p>26°C</p>

                        <p>🌧️</p>

                    </div>

                    <div class="forecast-card">

                        <p>Thursday</p>

                        <p>24°C</p>

                        <p>❄️</p>

                    </div>

                    <div class="forecast-card">

                        <p>Friday</p>

                        <p>32°C</p>

                        <p>☀️</p>

                    </div>

                </div>

            </div>


            <!-- LEFT CONTAINER -->
            <div class="left-container">

                <h2 class="section-title">
                    Weather Details
                </h2>

                <div class="basic">

                    <div class="humid">
                        HUMIDITY : --
                    </div>

                    <div class="windspeed">
                        WIND SPEED : --
                    </div>

                </div>
            </div>
            
            

        </div>

    </div>

    <script src="weth.js"></script>

</body>
</html>
